      </div>
    </nav>
  </header>
  <article>
<div class="scroll-container">
  <div class="sticky-stage">

    <div class="scroll-hint" id="hint">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 2v9M4 8l4 4 4-4" stroke="#888" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
     
    </div>

    <div class="logo-stage">
       
      <img id="layer-1" class="logo-layer"
           src="/images/Branding/Levant/figure.png"
           alt="figure" />

      <!-- LAYER 2 — e.g. LEVANT wordmark -->
      <img id="layer-2" class="logo-layer"
           src="/images/Branding/Levant/levant.png"
           alt="wordmark" />

      <!-- LAYER 3 — e.g. cedar tree icon -->
      <img id="layer-3" class="logo-layer"
           src="/images/Branding/Levant/tree.png"
           alt="icon" />

      <!-- LAYER 4 — e.g. GOURMET sub-text -->
      <img id="layer-4" class="logo-layer"
           src="/images/Branding/Levant/real.png"
           alt="sub-text" />

      <!-- LAYER 5 — e.g. REAL TOUM badge -->
      <img id="layer-5" class="logo-layer"
           src="/images/Branding/Levant/LevantMainLogo1.png"
           alt="logo" />

    </div><!-- /.logo-stage -->

    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <div class="dots">
      <div class="dot" id="dot-0"></div>
      <div class="dot" id="dot-1"></div>
      <div class="dot" id="dot-2"></div>
      <div class="dot" id="dot-3"></div>
      <div class="dot" id="dot-4"></div>
    </div>

  </div><!-- /.sticky-stage -->
</div><!-- /.scroll-container -->

<div class="mainlogo">     
     <img src="/images/Branding/Levant/garlic.png" alt="garlic lemon sauce" />
  </div>

    <div class="identity">
<img src="/images/Branding/Levant/type.png" />
<img src="/images/Branding/Levant/color.png"/>
    </div>
    <div class="labels">
      <img src="/images/Branding/Levant/label.png" alt="Levant Gourmet Label 3" />
    </div>


    <div class="mockups">
  <img src="/images/Branding/Levant/mockup1.png" alt="Levant container mockup" />
    <img src="/images/Branding/Levant/mockups.png" alt="Levant bag mockup" />
    </div>

   
  </article>
  <div class="centerImg">
    <br><br>
    <button onclick="location.href='/GraphicDesignPort.html'">BACK</button>
  </div>

      <button id="instagram-button">
        <img src="/images/insta-logo_black.png" alt="Instagram Logo" id="instagram-logo">
      </button>
    </section>
    <section class="copyright">
      <h3 class="sr-only">Copyright </h3>
      Copyright © 2017 AC Studios - All Rights Reserved.
    </section>
  </footer>

  <script src="/JS/gallery.js"></script>

  <script src="/JS/graphicpages.js"></script>
