<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="CSS/navigation.css">
  <link rel="stylesheet" href="CSS/contact.css">

  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cutive+Mono&family=Limelight&display=swap" rel="stylesheet">

  <link rel="icon" type="image/x-icon" href="image/favicon.ico">

  <title>Contact</title>
</head>

<body>

  <div class="progress-bar"></div>

  <h2 class="sr-only">Logo & Navigation</h2>

  <!-- Navigation -->
  <header>
    <nav>
      <a href="index.html" class="nav-logo">
        <img src="images/2x3.png" alt="AC Studios Home">
      </a>

      <div class="nav-controls">
        <ul>
          <li class="dropdown">
            <a href="#">PORTFOLIO</a>
            <div class="dropdown-content">
              <a href="GraphicDesignPort.html">Art & Design</a>
              <a href="PhotographyPort.html">Photography</a>
              <a href="videography.html">Videography</a>
            </div>
          </li>

          <li class="dropdown">
            <a href="#">SERVICES</a>
            <div class="dropdown-content">
              <a href="DesignShop.html">Design Services</a>
              <a href="PhotographyShop.html">Photo Services</a>
              <a href="PhotoGalleries/Galleries.html">Session Galleries</a>
            </div>
          </li>

          <li>
            <a href="Contact.html">CONTACT</a>
          </li>
        </ul>

        <button id="menu-toggle">
          <img src="images/menuicon.png" alt="menu">
        </button>
      </div>
    </nav>
  </header>

  <main>

    <form id="contact-form" class="contact-form">

      <input
        type="text"
        name="from_name"
        placeholder="Your Name:"
        required
      >

      <input
        type="email"
        name="reply_to"
        placeholder="Your Email:"
        required
      >

      <div class="project-type">
        <span class="project-label">Type of work</span>

        <label class="checkbox">
          <input
            type="radio"
            name="project_type"
            value="Photo Session"
            required
          >
          <span>Photo Session</span>
        </label>

        <label class="checkbox">
          <input
            type="radio"
            name="project_type"
            value="Design Work"
            required
          >
          <span>Design Work</span>
        </label>
      </div>

      <textarea
        name="message"
        placeholder="Message:"
        required
      ></textarea>

      <button type="submit">
        Send Message
      </button>

    </form>

    <p id="form-status"></p>

  </main>

  <footer>
    <div class="copyright">
      Copyright © 2017 AC Studios - All Rights Reserved.
    </div>
  </footer>

  <script src="/JS/index.js"></script>
  <script src="/JS/gallery.js"></script>
  <script src="/JS/nav.js"></script>

  <script>

    // Initialize EmailJS
    emailjs.init("A2jlAxMkZ-l2O1XZh");

    document.addEventListener("DOMContentLoaded", () => {

      const form = document.getElementById("contact-form");
      const status = document.getElementById("form-status");
      const messageField = form.querySelector('textarea[name="message"]');

      // Populate message field with checkout cart items
      const checkoutCart = JSON.parse(
        localStorage.getItem("checkoutCart") || "[]"
      );

      if (checkoutCart.length > 0) {

        const cartMessage = checkoutCart
          .map((item, index) => `${index + 1}. ${item}`)
          .join("\n");

        messageField.value =
`PHOTOS TO BE PURCHASED:

${cartMessage}




(please specify if you wish to purchase prints)`;

        localStorage.removeItem("checkoutCart");
      }

      // Single submit handler
      form.addEventListener("submit", function (e) {

        e.preventDefault();

        status.textContent = "Sending...";

        emailjs.sendForm(
          "service_kjush15",
          "template_ffqxpk2",
          this
        )
        .then(() => {

          status.textContent = "Message sent successfully!";
          form.reset();

        })
        .catch((error) => {

          console.error("EmailJS Error:", error);

          status.textContent =
            "Sorry, something went wrong. Please try again.";

        });

      });

    });

  </script>

</body>
</html>
